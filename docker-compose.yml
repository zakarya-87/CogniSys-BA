version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: cognisys-ba:local
    ports:
      - "8080:8080"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      PORT: 8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Development mode — hot reload via tsx watch
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: npx tsx watch server.ts
    ports:
      - "5000:5000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      PORT: 5000
    volumes:
      - .:/app
      - /app/node_modules
    profiles:
      - dev
